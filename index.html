<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Laser Mission</title>
    <!-- Підключаємо Tailwind CSS для стилів -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Підключаємо React та Babel для обробки компонентів -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#020408] text-slate-200 overflow-x-hidden">
    <!-- Сюди React вмонтує наш додаток -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- Власні SVG іконки (заміна Lucide для уникнення помилок DOM) ---
        const Icon = ({ path, size = 24, className = "", strokeWidth = 2 }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth={strokeWidth} 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
            >
                {path}
            </svg>
        );

        const Lock = (props) => <Icon {...props} path={<><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>} />;
        const Unlock = (props) => <Icon {...props} path={<><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></>} />;
        const ArrowRight = (props) => <Icon {...props} path={<><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></>} />;
        const Cpu = (props) => <Icon {...props} path={<><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></>} />;
        const Radio = (props) => <Icon {...props} path={<><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><circle cx="12" cy="12" r="2"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.2 19.1 19.1"/></>} />;
        const Activity = (props) => <Icon {...props} path={<><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></>} />;
        const CheckCircle2 = (props) => <Icon {...props} path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></>} />;
        const ChevronRight = (props) => <Icon {...props} path={<path d="m9 18 6-6-6-6"/>} />;
        const XIcon = (props) => <Icon {...props} path={<><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>} />;
        const HelpCircle = (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></>} />;
        const TimerIcon = (props) => <Icon {...props} path={<><line x1="10" x2="14" y1="2" y2="2"/><line x1="12" x2="12" y1="14" y2="11"/><circle cx="12" cy="14" r="8"/></>} />;

        // --- Звуковий рушій ---
        const useAudio = () => {
          const audioCtx = useRef(null);
          const initAudio = () => {
            if (!audioCtx.current) {
              audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
            }
          };
          const playTone = (freq, type, duration, volume = 0.1) => {
            try {
              initAudio();
              const osc = audioCtx.current.createOscillator();
              const gain = audioCtx.current.createGain();
              osc.type = type;
              osc.frequency.setValueAtTime(freq, audioCtx.current.currentTime);
              gain.gain.setValueAtTime(volume, audioCtx.current.currentTime);
              gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.current.currentTime + duration);
              osc.connect(gain);
              gain.connect(audioCtx.current.destination);
              osc.start();
              osc.stop(audioCtx.current.currentTime + duration);
            } catch(e) { /* Браузер може блокувати звук до взаємодії */ }
          };
          return {
            playClick: () => playTone(800, 'sine', 0.1, 0.05),
            playLevelShift: () => {
              playTone(400, 'square', 0.1, 0.03);
              setTimeout(() => playTone(600, 'square', 0.1, 0.03), 50);
            },
            playFieldSuccess: () => {
              playTone(1000, 'sine', 0.2, 0.05);
              playTone(1500, 'sine', 0.2, 0.03);
            },
            playUnlock: () => {
              [261, 329, 392, 523].forEach((f, i) => {
                setTimeout(() => playTone(f, 'sawtooth', 0.4, 0.03), i * 100);
              });
            }
          };
        };

        // --- Компонент інструктажу ---
        const GuidedTour = ({ steps, onFinish }) => {
          const [currentStep, setCurrentStep] = useState(0);
          const [coords, setCoords] = useState({ top: 0, left: 0, width: 0, height: 0 });

          useEffect(() => {
            const updateCoords = () => {
              const element = document.querySelector(`[data-tour="${steps[currentStep].target}"]`);
              if (element) {
                const rect = element.getBoundingClientRect();
                setCoords({ top: rect.top, left: rect.left, width: rect.width, height: rect.height });
              }
            };
            updateCoords();
            const timer = setTimeout(updateCoords, 100);
            window.addEventListener('resize', updateCoords);
            return () => {
              window.removeEventListener('resize', updateCoords);
              clearTimeout(timer);
            };
          }, [currentStep, steps]);

          const step = steps[currentStep];

          const getTooltipStyle = () => {
            const margin = 20;
            const tooltipWidth = 320;
            let topPos = coords.top + coords.height + margin;
            let leftPos = coords.left + coords.width / 2 - tooltipWidth / 2;
            if (topPos + 220 > window.innerHeight) topPos = coords.top - 240;
            leftPos = Math.max(margin, Math.min(leftPos, window.innerWidth - tooltipWidth - margin));
            return { top: Math.max(10, topPos), left: leftPos, width: `${tooltipWidth}px` };
          };

          return (
            <div className="fixed inset-0 z-[200] pointer-events-none">
              <div 
                className="absolute inset-0 bg-black/80 transition-all duration-500"
                style={{ clipPath: `polygon(0% 0%, 0% 100%, ${coords.left}px 100%, ${coords.left}px ${coords.top}px, ${coords.left + coords.width}px ${coords.top}px, ${coords.left + coords.width}px ${coords.top + coords.height}px, ${coords.left}px ${coords.top + coords.height}px, ${coords.left}px 100%, 100% 100%, 100% 0%)` }}
              />
              <div 
                className="absolute bg-[#1a1d24] border border-amber-500/50 p-6 rounded-3xl shadow-[0_0_50px_rgba(0,0,0,0.5)] pointer-events-auto transition-all duration-500"
                style={getTooltipStyle()}
              >
                <div className="flex justify-between items-start mb-3">
                  <span className="bg-amber-500 text-black text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-tighter">
                    Крок {currentStep + 1}/{steps.length}
                  </span>
                  <button onClick={onFinish} className="text-white/20 hover:text-white transition-colors">
                    <XIcon size={16} />
                  </button>
                </div>
                <h4 className="text-white font-black text-lg mb-2 uppercase tracking-tight">{step.title}</h4>
                <p className="text-slate-400 text-sm leading-relaxed mb-6">{step.content}</p>
                <button 
                  onClick={() => currentStep < steps.length - 1 ? setCurrentStep(s => s + 1) : onFinish()}
                  className="w-full py-3 bg-amber-500 hover:bg-amber-400 text-black font-black uppercase tracking-widest text-[10px] rounded-xl flex items-center justify-center gap-2 transition-all active:scale-95 shadow-lg shadow-amber-500/10"
                >
                  {currentStep < steps.length - 1 ? 'Далі' : 'Почати місію'} <ChevronRight size={14} />
                </button>
              </div>
            </div>
          );
        };

        const InputField = ({ id, label, icon: IconComponent, colorClass, placeholder, value, onChange, disabled, correctValue, stepLabel, tourId }) => {
          const isCorrect = parseInt(value) === correctValue;
          return (
            <div className="flex-1 flex flex-col gap-1.5" data-tour={tourId}>
              <div className="flex justify-between items-end px-1">
                <span className="text-[9px] font-bold text-white/30 uppercase tracking-widest">{stepLabel}</span>
                <span className={`text-[10px] font-black uppercase tracking-widest ${colorClass}`}>{label}</span>
              </div>
              <div className={`relative flex items-center bg-black/40 rounded-xl border transition-all duration-300 group ${isCorrect ? 'border-amber-500 ring-4 ring-amber-500/10 shadow-[0_0_15px_rgba(245,158,11,0.2)]' : 'border-white/10 focus-within:border-white/30'}`}>
                <div className={`w-10 h-10 flex items-center justify-center rounded-l-xl border-r border-white/5 ${isCorrect ? 'bg-amber-500 text-black' : `bg-white/5 ${colorClass}`}`}>
                  {isCorrect ? <CheckCircle2 size={18} /> : <IconComponent size={18} />}
                </div>
                <input 
                  type="text" inputMode="numeric" 
                  value={value || ''} 
                  onChange={(e) => onChange(id, e.target.value)} 
                  className="w-full bg-transparent px-3 py-2 text-lg font-black outline-none text-white placeholder-white/5" 
                  placeholder={placeholder} 
                  disabled={disabled}
                />
              </div>
            </div>
          );
        };

        const ModeStat = ({ icon: IconComponent, value }) => (
          <div className="flex items-center gap-3 w-full justify-start group">
            <div className="text-slate-500 transition-colors duration-300">
              <IconComponent size={18} />
            </div>
            <span className="text-xl font-medium text-slate-500 tabular-nums">{value}</span>
          </div>
        );

        // --- Основний додаток ---
        const App = () => {
          const [gameState, setGameState] = useState('playing'); 
          const [level, setLevel] = useState('classic'); 
          const [config, setConfig] = useState(null);
          const [inputs, setInputs] = useState({});
          const [rotation, setRotation] = useState(-90);
          const [showTour, setShowTour] = useState(false);
          const [viewedTours, setViewedTours] = useState(new Set());
          
          const [missionStats, setMissionStats] = useState({ classic: 0, algebra: 0, pro: 0 });
          const [seconds, setSeconds] = useState(0);
          const [isTimerActive, setIsTimerActive] = useState(true);

          const sound = useAudio();
          const alphabet = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'];
          
          const themeColors = { locked: 'rgba(255, 0, 0,  0.6)', unlocked: 'rgba(251, 191, 36, 0.5)' };
          const RADIUS_VALUES = 125, RADIUS_LETTERS = 200, RAY_LENGTH = 250, RADIUS_ARC_Y = 285, RADIUS_LABEL_Y = 285, COMMON_STROKE_WIDTH = 2;

          useEffect(() => {
            let interval = null;
            if (isTimerActive) interval = setInterval(() => setSeconds(prev => prev + 1), 1000);
            return () => clearInterval(interval);
          }, [isTimerActive]);

          const formatTime = (totalSeconds) => {
            const mins = Math.floor(totalSeconds / 60);
            const secs = totalSeconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
          };

          useEffect(() => {
            const saved = localStorage.getItem('geo_mission_tours');
            if (saved) {
              try { setViewedTours(new Set(JSON.parse(saved))); } 
              catch (e) { console.error("Cache load failed", e); }
            }
          }, []);

          useEffect(() => {
            localStorage.setItem('geo_mission_tours', JSON.stringify([...viewedTours]));
          }, [viewedTours]);

          useEffect(() => {
            if (!viewedTours.has(level)) {
              const timer = setTimeout(() => {
                setShowTour(true);
                setViewedTours(prev => new Set([...prev, level]));
              }, 800);
              return () => clearTimeout(timer);
            }
          }, [level, viewedTours]);

          const generateLevel = useCallback((selectedLevel = level, isNewMission = true) => {
              setInputs({});
              setGameState("playing");
              setLevel(selectedLevel);
              
              if (isNewMission && config !== null) {
                setMissionStats(prev => ({ ...prev, [level]: prev[level] + 1 }));
              }

              const randomTilt = Math.random() * 60 - 30;
              setRotation(-90 + randomTilt);
              
              if (selectedLevel === "classic") {
                let success = false;
                let attempt = 0;
                while (!success && attempt < 50) {
                  attempt++;
                  const a1 = Math.floor(Math.random() * 46) + 10;
                  const a2Base = 180 - a1;
                  const convenient = [30, 45, 60, 90, 100, 110].filter((v) => v < a2Base - 15);
                  let baseAngles;
                  if (convenient.length > 0 && Math.random() > 0.4) {
                    const a3 = convenient[Math.floor(Math.random() * convenient.length)];
                    baseAngles = [a1, a3, 180 - a1 - a3];
                  } else {
                    baseAngles = [a1, 180 - a1];
                  }
                  const shuffledBase = [...baseAngles].sort(() => Math.random() - 0.5);
                  const allAngles = [...shuffledBase, ...shuffledBase];
                  const displayLabels = Array(allAngles.length).fill(null);
                  const halfSize = allAngles.length / 2;
                  
                  const qIdx = Math.floor(Math.random() * allAngles.length);
                  displayLabels[qIdx] = "?";
                  
                  const mirroredQIdx = (qIdx + halfSize) % allAngles.length;
                  const hintCount = allAngles.length === 6 ? 2 : 1;
                  const chosenHints = [];
                  
                  let availableIndices = Array.from({ length: allAngles.length }, (_, i) => i)
                    .filter((idx) => idx !== qIdx);

                  if (allAngles.length === 6) availableIndices = availableIndices.filter(idx => idx !== mirroredQIdx);

                  for (let i = 0; i < hintCount; i++) {
                    if (availableIndices.length === 0) break;
                    const randIdx = Math.floor(Math.random() * availableIndices.length);
                    const selectedIdx = availableIndices[randIdx];
                    const mirroredSelectedIdx = (selectedIdx + halfSize) % allAngles.length;
                    chosenHints.push(selectedIdx);
                    availableIndices = availableIndices.filter((idx) => idx !== selectedIdx && idx !== mirroredSelectedIdx);
                  }

                  if (chosenHints.length < hintCount) continue; 

                  chosenHints.forEach((idx) => { displayLabels[idx] = `${allAngles[idx]}°`; });
                  
                  setConfig({ type: "classic", allAngles, displayLabels, targetAngleIdx: qIdx, answerValue: allAngles[qIdx] });
                  success = true;
                }
              } else {
                const isPro = selectedLevel === "pro";
                const k = Math.floor(Math.random() * 3) + 1;
                const a1 = Math.floor(Math.random() * 25) + 15;
                const a2 = k * a1;
                const a3Choices = [30, 45, 60, 80, 90, 100, 110].filter((v) => v < 180 - a1 - a2 - 15);
                let baseAngles;
                if (isPro && a3Choices.length > 0) {
                  const a3 = a3Choices[Math.floor(Math.random() * a3Choices.length)];
                  const a4 = 180 - a1 - a2 - a3;
                  baseAngles = [a1, a2, a3, a4];
                } else {
                  baseAngles = [a1, a2, 180 - a1 - a2];
                }
                const shuffledBase = [...baseAngles].sort(() => Math.random() - 0.5);
                const allAngles = [...shuffledBase, ...shuffledBase];
                const halfSize = allAngles.length / 2;
                const displayLabels = Array(allAngles.length).fill(null);

                const numHints = allAngles.length === 8 ? 2 : 1;
                const chosenHints = [];
                let availableForLabels = Array.from({ length: allAngles.length }, (_, i) => i);
                
                for (let i = 0; i < numHints; i++) {
                  const randIdx = Math.floor(Math.random() * availableForLabels.length);
                  const selIdx = availableForLabels[randIdx];
                  chosenHints.push(selIdx);
                  displayLabels[selIdx] = `${allAngles[selIdx]}°`;
                  const mirIdx = (selIdx + halfSize) % allAngles.length;
                  availableForLabels = availableForLabels.filter(idx => idx !== selIdx && idx !== mirIdx);
                }

                const xPool = availableForLabels.filter(idx => allAngles[idx] === a1);
                if (xPool.length === 0) { generateLevel(selectedLevel, false); return; } 
                
                const xIdx = xPool[Math.floor(Math.random() * xPool.length)];
                displayLabels[xIdx] = "x";
                
                const mirroredXIdx = (xIdx + halfSize) % allAngles.length;
                availableForLabels = availableForLabels.filter(idx => idx !== xIdx && idx !== mirroredXIdx);

                const kxPool = availableForLabels.filter(idx => allAngles[idx] === a2);
                if (kxPool.length === 0) { generateLevel(selectedLevel, false); return; }
                
                const kxIdx = kxPool[Math.floor(Math.random() * kxPool.length)];
                displayLabels[kxIdx] = k === 1 ? "x" : `${k}x`;
                
                const mirroredKxIdx = (kxIdx + halfSize) % allAngles.length;
                availableForLabels = availableForLabels.filter(idx => idx !== kxIdx && idx !== mirroredKxIdx);

                const targetCandidates = [];
                if (k > 1) targetCandidates.push((kxIdx + halfSize) % allAngles.length);
                chosenHints.forEach(idx => targetCandidates.push((idx + halfSize) % allAngles.length));

                const targetAngleIdx = targetCandidates.find(idx => !displayLabels[idx]) || (targetCandidates.length > 0 ? targetCandidates[0] : (kxIdx + halfSize) % allAngles.length);
                
                let yConfig = null;
                if (isPro) {
                  const yCount = Math.random() > 0.5 ? 3 : 2;
                  const yStart = Math.floor(Math.random() * allAngles.length);
                  const yIndices = [];
                  let yVal = 0;
                  let cumulativeStartAngle = 0;
                  for (let i = 0; i < yStart; i++) cumulativeStartAngle += allAngles[i];
                  for (let i = 0; i < yCount; i++) {
                    const idx = (yStart + i) % allAngles.length;
                    yIndices.push(idx);
                    yVal += allAngles[idx];
                  }
                  yConfig = { indices: yIndices, value: Math.round(yVal), startAngleOffset: cumulativeStartAngle, totalSpan: yVal };
                }
                
                setConfig({
                  type: isPro ? "pro_algebra" : "algebra",
                  allAngles, displayLabels, yConfig, targetAngleIdx, answerX: a1,
                  answerTargetAngle: allAngles[targetAngleIdx],
                  answerY: isPro ? yConfig?.value : null
                });
              }
          }, [level, config]);

          useEffect(() => { generateLevel(level, false); }, [level]);

          const handleInputChange = (id, val) => {
            if (gameState === 'success' || !config) return;
            const cleanVal = val.replace(/[^0-9]/g, '');
            const correct = (id === 'x' ? config.answerX : id === 'y' ? config.answerY : id === 'target' ? config.answerTargetAngle : config.answerValue);
            
            if (cleanVal && parseInt(cleanVal) === correct) sound.playFieldSuccess();

            const newInputs = { ...inputs, [id]: cleanVal };
            setInputs(newInputs);
            
            let solved = false;
            if (config.type === 'pro_algebra') {
              solved = parseInt(newInputs['x']) === config.answerX && parseInt(newInputs['target']) === config.answerTargetAngle && parseInt(newInputs['y']) === config.answerY;
            } else if (config.type === 'algebra') {
              solved = parseInt(newInputs['x']) === config.answerX && parseInt(newInputs['target']) === config.answerTargetAngle;
            } else {
              solved = parseInt(newInputs['ans']) === config.answerValue;
            }

            if (solved) {
              setGameState('success');
              sound.playUnlock();
            }
          };

          const getTourSteps = () => {
            if (level === 'classic') return [
                { target: 'main-wheel', title: 'Схема кутів', content: 'Тут зображені кути. Літери (A, B...) позначають кожен окремий кут.' },
                { target: 'target-label', title: 'Цільовий кут', content: 'Знак "?" вказує на кут, градусну міру якого потрібно знайти.' },
                { target: 'input-main', title: 'Поле вводу', content: 'Після проведення обчислень введи сюди результат.' }
            ];
            if (level === 'algebra') return [
                { target: 'main-wheel', title: 'Алгебра', content: 'Тут кути задані через змінні (x, 2x). Використовуй відомі числа поруч, щоб знайти x.' },
                { target: 'input-x', title: 'Знайти X', content: 'Спочатку обчисли значення x і введи його сюди.' },
                { target: 'input-target', title: 'Фінальний кут', content: 'А сюди введи значення конкретного названого кута.' }
            ];
            return [
                { target: 'input-x', title: 'Крок 1: Базовий X', content: 'Для початку знайди значення невідомого x.' },
                { target: 'input-target', title: 'Крок 2: Цільовий кут', content: 'Тепер обчисли значення конкретного названого кута.' },
                { target: 'arc-y', title: 'Крок 3: Великий кут Y', content: 'Знайди загальну суму кутів, що охоплені блакитною лінією Y.' },
                { target: 'input-y', title: 'Фінальний ввід', content: 'Введи суму для Y сюди.' }
            ];
          };

          const polarToCartesian = (radius, angleInDegrees) => {
            const rad = (angleInDegrees * Math.PI) / 180.0;
            return { x: radius * Math.cos(rad), y: radius * Math.sin(rad) };
          };

          const describeStaticArc = (span, radius) => {
            const start = polarToCartesian(radius, span);
            const end = polarToCartesian(radius, 0);
            return ["M", end.x, end.y, "A", radius, radius, 0, span <= 180 ? "0" : "1", 1, start.x, start.y].join(" ");
          };

          const getSVGCoords = (index, dist) => {
            if (!config) return { x: 0, y: 0 };
            let currentAngle = rotation;
            for (let i = 0; i < index; i++) currentAngle += config.allAngles[i];
            const midAngle = currentAngle + config.allAngles[index] / 2;
            return polarToCartesian(dist, midAngle);
          };

          const getYCoords = (dist) => {
            if (!config?.yConfig) return { x: 0, y: 0 };
            const midAngle = rotation + config.yConfig.startAngleOffset + (config.yConfig.totalSpan / 2);
            return polarToCartesian(dist, midAngle);
          };

          return (
            <div className="min-h-screen bg-[#020408] text-slate-200 font-sans p-4 lg:p-8 flex flex-col items-center overflow-x-hidden relative">
              <style>{`
                @keyframes flowText { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
                .success-banner { animation: flowText 15s linear infinite; }
                .svg-transition { transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
                path.svg-transition { transition: d 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
              `}</style>

              {showTour && <GuidedTour steps={getTourSteps()} onFinish={() => setShowTour(false)} />}
              
              {gameState === 'success' && (
                <div className="fixed inset-0 z-0 flex flex-col justify-center pointer-events-none opacity-20 select-none overflow-hidden">
                  {[...Array(6)].map((_, i) => (
                    <div key={i} className="success-banner text-[120px] font-black whitespace-nowrap leading-none py-4 text-amber-500 tracking-tighter" style={{ animationDirection: i % 2 === 0 ? 'normal' : 'reverse', animationDuration: `${10 + i * 3}s` }}>
                     • MISSION ACCOMPLISHED • MISSION ACCOMPLISHED • MISSION ACCOMPLISHED • MISSION ACCOMPLISHED
                    </div>
                  ))}
                </div>
              )}

              <div className="fixed right-8 top-8 z-[100] flex flex-col items-end">
                <div className="bg-black/40 backdrop-blur-md border border-white/10 px-6 py-3 rounded-2xl flex items-center gap-3 shadow-2xl transition-all hover:border-white/30">
                  <TimerIcon className="text-amber-500 animate-pulse" size={18} />
                  <span className="text-2xl font-black text-white tabular-nums tracking-tighter">
                    {formatTime(seconds)}
                  </span>
                </div>
                <span className="text-[8px] font-black text-white/30 uppercase tracking-[0.3em] mt-2 mr-2">Session Runtime</span>
              </div>

              <div className="fixed right-8 top-1/2 -translate-y-1/2 hidden xl:flex flex-col gap-4 z-[100] min-w-[80px]">
                 <ModeStat icon={Radio} value={missionStats.classic} />
                 <ModeStat icon={Cpu} value={missionStats.algebra} />
                 <ModeStat icon={Activity} value={missionStats.pro} />
              </div>

              <div className="xl:hidden flex gap-6 mb-6 z-20 bg-black/40 p-4 rounded-3xl border border-white/10 backdrop-blur-md">
                 <div className="flex items-center gap-2">
                    <Radio size={14} className="text-slate-500" />
                    <span className="text-lg font-medium text-slate-500">{missionStats.classic}</span>
                 </div>
                 <div className="flex items-center gap-2">
                    <Cpu size={14} className="text-slate-500" />
                    <span className="text-lg font-medium text-slate-500">{missionStats.algebra}</span>
                 </div>
                 <div className="flex items-center gap-2">
                    <Activity size={14} className="text-slate-500" />
                    <span className="text-lg font-medium text-slate-500">{missionStats.pro}</span>
                 </div>
              </div>

              <div className="flex items-center gap-2 mb-4 z-20">
                <div className="flex bg-slate-900/40 p-1 rounded-2xl border border-white/5 backdrop-blur-xl shadow-2xl">
                  {[
                    { id: 'classic', label: 'Базовий', icon: Radio },
                    { id: 'algebra', label: 'Логіка', icon: Cpu },
                    { id: 'pro', label: 'Еліта', icon: Activity }
                  ].map(t => (
                    <button key={t.id} onClick={() => { setLevel(t.id); sound.playLevelShift(); }} className={`flex items-center gap-2 px-6 py-2.5 rounded-xl transition-all duration-300 ${level === t.id ? 'text-amber-400 bg-white/10 shadow-lg shadow-black' : 'text-slate-500 hover:text-slate-300'}`}>
                      <t.icon size={14} />
                      <span className="text-[11px] uppercase tracking-widest font-black">{t.label}</span>
                    </button>
                  ))}
                </div>
                <button onClick={() => { setShowTour(true); sound.playClick(); }} className="w-11 h-11 flex items-center justify-center rounded-2xl bg-white/5 border border-white/10 text-white/40 hover:text-amber-500 hover:border-amber-500/50 hover:bg-amber-500/10 transition-all active:scale-95">
                  <HelpCircle size={20} />
                </button>
              </div>

              <div className="flex flex-col items-center w-full max-w-4xl relative z-10">
                <div data-tour="main-wheel" className="relative w-full max-w-[650px] aspect-square mb-2 flex items-center justify-center transition-transform duration-500">
                  <svg viewBox="-360 -360 720 720" className="w-full h-full drop-shadow-2xl overflow-visible">
                    <defs>
                      <radialGradient id="fieldGradient" cx="0" cy="0" r="240" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stopColor="currentColor" stopOpacity="0.8" />
                        <stop offset="100%" stopColor="currentColor" stopOpacity="0" />
                      </radialGradient>
                      <mask id="fieldMask"><circle cx="0" cy="0" r="260" fill="url(#fieldGradient)" /></mask>
                      <linearGradient id="rayGradient" x1="0" y1="0" x2={RAY_LENGTH} y2="0" gradientUnits="userSpaceOnUse">
                        <stop offset="70%" stopColor="white" stopOpacity="0.4" />
                        <stop offset="95%" stopColor="#a1a1a1" stopOpacity="0.9" />
                      </linearGradient>
                    </defs>
                    <circle cx="0" cy="0" r="250" fill={gameState === 'success' ? themeColors.unlocked : themeColors.locked} mask="url(#fieldMask)" className="transition-colors duration-1000" />
                    
                    {config?.allAngles.map((ang, i) => {
                      let startAngle = rotation;
                      for (let j = 0; j < i; j++) startAngle += config.allAngles[j];
                      return (
                        <g key={`ray-group-${i}`} className="svg-transition" transform={`rotate(${startAngle})`}>
                          <line x1="0" y1="0" x2={RAY_LENGTH} y2="0" stroke="url(#rayGradient)" strokeWidth={COMMON_STROKE_WIDTH} />
                          <circle cx={RAY_LENGTH} cy="0" r="4" fill="#a1a1a1" />
                        </g>
                      );
                    })}

                    {config?.yConfig && (
                      <g data-tour="arc-y" className="svg-transition" transform={`rotate(${rotation + config.yConfig.startAngleOffset})`}>
                        <path d={describeStaticArc(config.yConfig.totalSpan, RADIUS_ARC_Y)} fill="none" stroke="#38bdf8" strokeWidth={COMMON_STROKE_WIDTH} strokeLinecap="round" />
                        <circle cx={polarToCartesian(RADIUS_ARC_Y, 0).x} cy={polarToCartesian(RADIUS_ARC_Y, 0).y} r="4" fill="#38bdf8" />
                        <circle cx={polarToCartesian(RADIUS_ARC_Y, config.yConfig.totalSpan).x} cy={polarToCartesian(RADIUS_ARC_Y, config.yConfig.totalSpan).y} r="4" fill="#38bdf8" />
                      </g>
                    )}
                    
                    {config?.allAngles.map((ang, i) => {
                      const { x, y } = getSVGCoords(i, RADIUS_LETTERS);
                      return <text key={`alpha-${i}`} textAnchor="middle" dominantBaseline="middle" className="fill-white/30 font-mono font-black text-2xl pointer-events-none svg-transition" style={{ transform: `translate(${x}px, ${y}px)` }}>{alphabet[i]}</text>;
                    })}

                    {config?.allAngles.map((ang, i) => {
                      const label = config.displayLabels[i];
                      if (!label) return null;
                      const { x, y } = getSVGCoords(i, RADIUS_VALUES);
                      return (
                        <g key={`lbl-svg-${i}`} className="svg-transition" style={{ transform: `translate(${x}px, ${y}px)` }} data-tour={label === '?' ? 'target-label' : undefined}>
                           <rect x="-22" y="-12" width="44" height="24" rx="4" className="fill-black/60 stroke-white/10" />
                           <text x="0" y="0" textAnchor="middle" dominantBaseline="middle" className="font-black text-[16px] pointer-events-none fill-white">{label}</text>
                        </g>
                      );
                    })}

                    {config?.yConfig && (
                      <g className="svg-transition" style={{ transform: `translate(${getYCoords(RADIUS_LABEL_Y).x}px, ${getYCoords(RADIUS_LABEL_Y).y}px)` }}>
                        <circle cx="0" cy="0" r="18" className="fill-black stroke-sky-500 stroke-[2] shadow-lg" />
                        <text x="0" y="0" textAnchor="middle" dominantBaseline="central" className="fill-sky-500 font-black text-[18px] pointer-events-none">Y</text>
                      </g>
                    )}
                  </svg>

                  <div className="absolute flex items-center justify-center z-40">
                    {gameState === 'success' && <div className="absolute w-[100px] h-[100px] rounded-full bg-amber-500/40 animate-ping" />}
                    <div className={`w-[60px] h-[60px] rounded-full border flex items-center justify-center backdrop-blur-md transition-all duration-700 ${gameState === 'success' ? 'border-amber-500 bg-amber-400 shadow-[0_0_40px_rgba(245,158,11,0.6)] scale-110' : 'border-white/10 bg-slate-900/80'} `}>
                      {gameState === 'success' ? <Unlock className="text-black animate-pulse" size={26} strokeWidth={3} /> : <Lock className="text-white/40" size={20} />}
                    </div>
                  </div>
                </div>

                <div className="w-full max-w-xl px-4 z-50">
                  <div className="bg-[#0a0c10] border border-white/10 p-6 rounded-[2rem] shadow-2xl">
                    <div className="flex flex-col gap-4">
                      {(config?.type === 'algebra' || config?.type === 'pro_algebra') && (
                        <div className="flex flex-col md:flex-row gap-4">
                          <InputField tourId="input-x" id="x" stepLabel="Крок 1" label="Введіть X" icon={Activity} colorClass="text-amber-400" placeholder="--" value={inputs['x']} onChange={handleInputChange} disabled={gameState === 'success'} correctValue={config.answerX} />
                          <InputField tourId="input-target" id="target" stepLabel="Крок 2" label={`Кут ${alphabet[config.targetAngleIdx]}`} icon={Cpu} colorClass="text-amber-400" placeholder="---" value={inputs['target']} onChange={handleInputChange} disabled={gameState === 'success'} correctValue={config.answerTargetAngle} />
                        </div>
                      )}
                      {config?.type === 'pro_algebra' && <InputField tourId="input-y" id="y" stepLabel="Крок 3" label="Сума Y" icon={Activity} colorClass="text-sky-400" placeholder="---" value={inputs['y']} onChange={handleInputChange} disabled={gameState === 'success'} correctValue={config.answerY} />}
                      {config?.type === 'classic' && <InputField tourId="input-main" id="ans" stepLabel="Злам" label={`Кут ${alphabet[config.targetAngleIdx]}`} icon={Radio} colorClass="text-amber-400" placeholder="---" value={inputs['ans']} onChange={handleInputChange} disabled={gameState === 'success'} correctValue={config.answerValue} />}
                      {gameState === 'success' && (
                        <button onClick={() => generateLevel(level, true)} className="w-full py-4 bg-amber-500 text-black font-black uppercase tracking-[0.2em] rounded-xl flex items-center justify-center gap-3 animate-bounce shadow-[0_0_20px_rgba(245,158,11,0.4)] transition-transform active:scale-95">
                          Наступна ціль <ArrowRight size={18} />
                        </button>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
